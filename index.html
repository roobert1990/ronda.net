<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sistema de monitoramento de impressoras e níveis de toner em tempo real.">
    <title>RONDA.NET</title>
    
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdn.tailwindcss.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 font-sans text-slate-900 relative">

    

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 z-[100] transform translate-y-24 transition-transform duration-500">
        <div id="toast-content" class="flex items-center gap-3 px-8 py-4 rounded-full shadow-2xl font-black text-xs text-white uppercase tracking-widest min-w-[300px] justify-center">
            <i id="toast-icon" class="fas"></i>
            <span id="toast-msg"></span>
        </div>
    </div>

    <nav class="bg-slate-900 text-white p-4 sticky top-0 z-50 shadow-2xl">
        <div class="container mx-auto flex flex-col md:flex-row justify-between items-center px-4 gap-4">
            <h1 class="text-2xl font-black text-blue-400 uppercase tracking-tighter">RONDA<span class="text-white">.NET</span></h1>
            
            <div class="relative w-full max-w-md group">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-blue-400 transition-colors"></i>
                <input type="text" id="main_search" placeholder="Buscar por SELB ou Setor..." 
                       class="w-full bg-slate-800 border-none pl-11 pr-4 py-2 rounded-xl text-sm font-bold focus:ring-2 focus:ring-blue-500 outline-none transition-all placeholder:text-slate-500">
            </div>

            <div class="flex gap-3 items-center">
                <div class="relative mr-2">
                    <button onclick="filterVazios()" title="Ver Coletas Pendentes" class="text-slate-400 hover:text-blue-400 transition-colors relative flex items-center">
                        <i class="fas fa-bell text-lg"></i>
                        <span id="notif-badge" class="hidden absolute -top-2 -right-2 bg-red-600 text-white text-[11px] font-black w-5 h-5 rounded-full flex items-center justify-center border-2 border-slate-900 animate-bounce">0</span>
                    </button>
                </div>
                <button onclick="openReportModal()" class="px-4 py-2 bg-blue-600 rounded-xl text-xs font-black shadow-lg hover:bg-blue-500 transition-colors uppercase tracking-widest"><i class="fas fa-chart-bar mr-1"></i> Relatório</button>
                <button onclick="openModal()" class="px-4 py-2 bg-emerald-600 rounded-xl text-xs font-black shadow-lg hover:bg-emerald-500 transition-colors uppercase tracking-widest"><i class="fas fa-plus mr-1"></i> Novo</button>
                <a href="usuario.html" target="_blank" class="bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded-lg font-bold text-sm flex items-center gap-2"><i class="fas fa-external-link-alt"></i> TELA USUÁRIO</a>
            </div>
        </div>
    </nav>

    <main class="container mx-auto mt-8 px-4">
        <section id="view-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 pb-20"></section>
    </main>

    <div id="modal" class="hidden fixed inset-0 bg-slate-900/90 backdrop-blur-sm flex items-center justify-center z-[60] p-4">
        <div class="bg-white p-8 rounded-[3rem] w-full max-w-md shadow-2xl">
            <h2 class="text-3xl font-black mb-6 text-slate-800 uppercase tracking-tighter">Configurar Ativo</h2>
            <form id="formPrinter" class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="m_selb" placeholder="SELB" class="border-2 p-3 rounded-xl font-black uppercase outline-none">
                    <select id="m_type" onchange="toggleEstoque()" class="border-2 p-3 rounded-xl font-black outline-none">
                        <option value="MONO">PRETO (K)</option>
                        <option value="COLOR">COLORIDA</option>
                    </select>
                </div>
                <input type="text" id="m_setor" placeholder="Setor" class="w-full border-2 p-3 rounded-xl font-bold outline-none">
                <input type="text" id="m_ip" placeholder="IP" class="w-full border-2 p-3 rounded-xl font-mono outline-none">
                <input type="text" id="m_model" placeholder="Modelo" class="w-full border-2 p-3 rounded-xl font-bold outline-none">
                <!-- Os campos de código do cartucho são agora gerados dinamicamente por script.js com base no tipo de impressora -->
                <div id="m_estoque_grid" class="bg-slate-50 p-4 rounded-2xl border border-slate-200">
                </div>
                <div class="flex gap-3 pt-6">
                    <button type="button" onclick="closeModal()" class="flex-1 font-black text-slate-400 text-xs uppercase tracking-widest">Cancelar</button>
                    <button type="submit" class="flex-[2] bg-slate-900 text-white p-4 rounded-2xl font-black text-xs uppercase shadow-xl tracking-widest">Salvar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal de Confirmação de Coleta -->
    <div id="modal-coleta" class="hidden fixed inset-0 bg-slate-900/90 backdrop-blur-sm flex items-center justify-center z-[70] p-4">
        <div class="bg-white p-8 rounded-[3rem] w-full max-w-sm shadow-2xl text-center">
            <div class="bg-amber-100 text-amber-600 w-20 h-20 rounded-[2.5rem] flex items-center justify-center text-3xl mx-auto mb-6 shadow-inner">
                <i class="fas fa-truck-loading"></i>
            </div>
            <h2 class="text-3xl font-black mb-2 text-slate-800 uppercase tracking-tighter">Registrar Coleta</h2>
            <p class="text-slate-500 font-bold text-base mb-8">Deseja zerar os cartuchos vazios de <span id="coleta-selb-display" class="text-slate-900"></span>?</p>
            <div class="flex gap-3">
                <button onclick="closeColetaModal()" class="flex-1 font-black text-slate-400 text-xs uppercase tracking-widest hover:text-slate-600 transition-colors">Cancelar</button>
                <button onclick="confirmarColeta()" class="flex-[2] bg-amber-600 text-white p-4 rounded-2xl font-black text-xs uppercase shadow-xl tracking-widest hover:bg-amber-700 transition-all">Confirmar</button>
            </div>
        </div>
    </div>

    <!-- Modal de Relatório de Cartuchos -->
    <div id="modal-report" class="hidden fixed inset-0 bg-slate-900/90 backdrop-blur-sm flex items-center justify-center z-[80] p-4">
        <div class="bg-white p-8 rounded-[3rem] w-full max-w-lg shadow-2xl">
            <h2 class="text-3xl font-black mb-6 text-slate-800 uppercase tracking-tighter text-center">Relatório de Cartuchos</h2>
            <div id="report-content" class="space-y-4 max-h-[70vh] overflow-y-auto pr-2">
                <!-- Conteúdo do relatório será injetado aqui -->
            </div>
            <div class="flex justify-center mt-8">
                <button type="button" onclick="closeReportModal()" class="flex-1 max-w-[200px] font-black text-slate-400 text-xs uppercase tracking-widest hover:text-slate-600 transition-colors">Fechar</button>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
